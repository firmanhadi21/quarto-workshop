name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # analisis.qmd memakai mesin knitr (R). Hasilnya dibekukan (_freeze/), jadi CI
      # TIDAK menjalankan kode analisis — tapi knitr tetap perlu R + knitr/rmarkdown
      # untuk merakit keluaran beku.
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install knitr + rmarkdown
        run: Rscript -e 'install.packages(c("knitr","rmarkdown"))'

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render website
        run: quarto render

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
